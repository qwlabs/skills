<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;line-height:1.6;color:#333;background:#f5f7fa}
        .layout{display:flex;min-height:100vh}
        .sidebar{width:260px;background:#1a1a2e;color:#fff;flex-shrink:0;position:fixed;height:100vh;overflow-y:auto;transition:width 0.3s ease;z-index:100}
        .sidebar.collapsed{width:0;overflow:hidden}
        .sidebar-title{padding:20px;font-size:18px;font-weight:600;border-bottom:1px solid #2d2d44;display:flex;justify-content:space-between;align-items:center}
        .sidebar-toggle-inline{background:none;border:none;color:#fff;cursor:pointer;font-size:18px;padding:5px;border-radius:4px;transition:background 0.2s}
        .sidebar-toggle-inline:hover{background:rgba(255,255,255,0.1)}
        .sidebar-toggle-floating{position:fixed;left:10px;top:10px;z-index:1000;background:#1a1a2e;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:18px;padding:8px 12px;display:none;transition:background 0.2s}
        .sidebar-toggle-floating:hover{background:#2d2d44}
        .sidebar-toggle-floating.visible{display:block}
        .toc{list-style:none;padding:0}
        .toc-item{padding:0}
        .toc-group{margin-top:16px;padding:0 10px}
        .toc-group-title{display:block;padding:8px 15px;color:#e0e0e0;font-size:13px;font-weight:700;letter-spacing:0.5px;border-left:3px solid #0066cc;background:rgba(0,102,204,0.12);border-radius:2px;margin-bottom:4px;text-decoration:none}
        .toc-link{display:block;padding:6px 20px 6px 40px;color:#999;text-decoration:none;font-size:13px;border-left:3px solid transparent;transition:all 0.2s}
        .toc-link:hover{color:#fff;background:rgba(255,255,255,0.05)}
        .toc-link.active{color:#fff;background:rgba(0,102,204,0.2);border-left-color:#0066cc}
        .main{flex:1;margin-left:260px;padding:40px;max-width:calc(100% - 260px);transition:margin-left 0.3s ease,max-width 0.3s ease}
        .main.expanded{margin-left:0;max-width:100%}
        .api-section{background:#fff;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.08);margin-bottom:30px;overflow:hidden}
        .api-title{background:linear-gradient(135deg,#1a1a2e 0%,#2d2d44 100%);color:#fff;padding:20px 25px;font-size:20px;font-weight:600}
        .meta-section{padding:20px 25px;display:flex;flex-wrap:wrap;gap:12px;border-bottom:1px solid #eee;background:#fafbfc}
        .meta-block{display:flex;flex-direction:column;gap:6px;padding:12px 16px;background:#fff;border-radius:6px;border:1px solid #e8e8e8;min-width:120px}
        .meta-label{font-size:12px;color:#888;text-transform:uppercase;letter-spacing:0.5px}
        .meta-value{font-size:15px;font-weight:600;color:#333}
        .section{padding:20px 25px;border-bottom:1px solid #eee}
        .section:last-of-type{border-bottom:none}
        .section-title{font-size:17px;font-weight:600;color:#1a1a2e;margin-bottom:15px;display:flex;align-items:center;gap:8px}
        .section-title::before{content:'';width:4px;height:18px;background:#0066cc;border-radius:2px}
        .list{list-style:none;padding-left:0}
        .list li{padding:8px 0;padding-left:20px;position:relative;color:#555;font-size:14px}
        .list li::before{content:'•';position:absolute;left:0;color:#0066cc;font-weight:bold}
        .json-section{padding:25px;background:#fafbfc}
        .json-title{font-size:16px;font-weight:600;color:#1a1a2e;margin-bottom:18px;padding-bottom:12px;border-bottom:2px solid #0066cc;display:inline-block}
        .param-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:10px}
        .param-table th{background:#f8f9fa;padding:12px 15px;text-align:left;font-weight:600;color:#1a1a2e;border:1px solid #e0e0e0;white-space:nowrap}
        .param-table td{padding:12px 15px;border:1px solid #e0e0e0;vertical-align:top}
        .param-table tr:hover td{background:#f8f9fa}
        .field-name-cell{padding-left:15px !important}
        .field-name-cell.field-indent-1{padding-left:35px !important}
        .field-name-cell.field-indent-2{padding-left:55px !important}
        .field-name-cell.field-indent-3{padding-left:75px !important}
        .field-name-cell.field-indent-4{padding-left:95px !important}
        .field-name{font-family:'Monaco','Menlo',monospace;font-weight:600;color:#1565c0;background:#e8f4fd;padding:2px 8px;border-radius:3px;font-size:12px}
        .field-type{color:#e65100;font-size:12px}
        .field-required{color:#27ae60;font-size:12px;font-weight:600;background:#e8f5e9;padding:2px 6px;border-radius:3px}
        .field-optional{color:#95a5a6;font-size:12px;background:#f5f5f5;padding:2px 6px;border-radius:3px}
        .json-block{background:#282c34;border-radius:6px;overflow:hidden;position:relative}
        .json-block pre{padding:15px;margin:0;overflow-x:auto;color:#abb2bf}
        .json-block code{font-family:'Monaco','Menlo',monospace;font-size:13px;line-height:1.5;color:#abb2bf}
        .curl-block{position:relative}
        .curl-copy-btn{position:absolute;top:8px;right:8px;background:#3a3f4b;color:#abb2bf;border:1px solid #555;border-radius:4px;padding:4px 10px;font-size:12px;cursor:pointer;transition:background 0.2s}
        .curl-copy-btn:hover{background:#4a5060}
        .markdown-section{padding:20px 25px;line-height:1.8;color:#555;font-size:14px}
        .markdown-section h1,.markdown-section h2,.markdown-section h3{color:#1a1a2e;margin:15px 0 10px}
        .markdown-section ul,.markdown-section ol{padding-left:20px;margin:10px 0}
        .markdown-section code{font-family:'Monaco','Menlo',monospace;background:#f0f0f0;padding:2px 6px;border-radius:3px;font-size:12px}
        .markdown-section pre{background:#282c34;color:#abb2bf;padding:15px;border-radius:6px;overflow-x:auto;margin:10px 0}
        .markdown-section pre code{background:none;padding:0}
        .doc-footer{padding:20px;text-align:center;color:#888;font-size:12px;border-top:1px solid #eee;margin-top:20px}
        .overview-desc{color:#555;font-size:15px;line-height:1.8;padding:10px 0}
        .meta-block-wide{flex:1;min-width:200px}
        @media(max-width:768px){.sidebar{display:none}.main{margin-left:0;padding:20px}}
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/json.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/bash.min.js"></script>
    <script>
        function toggleSidebar(){
            const sidebar=document.querySelector('.sidebar');
            const main=document.querySelector('.main');
            const floatingBtn=document.querySelector('.sidebar-toggle-floating');
            const inlineBtn=document.querySelector('.sidebar-toggle-inline');
            sidebar.classList.toggle('collapsed');
            main.classList.toggle('expanded');
            const isCollapsed=sidebar.classList.contains('collapsed');
            floatingBtn.textContent=isCollapsed?'→':'←';
            inlineBtn.textContent=isCollapsed?'→':'←';
            if(isCollapsed){
                floatingBtn.classList.add('visible');
                inlineBtn.style.display='none'
            }else{
                floatingBtn.classList.remove('visible');
                inlineBtn.style.display='block'
            }
            localStorage.setItem('sidebarCollapsed',isCollapsed)
        }
        function highlightToc(e){
            document.querySelectorAll('.toc-link').forEach(l=>l.classList.remove('active'));
            e.classList.add('active')
        }
        document.querySelectorAll('.toc-link').forEach(l=>{
            l.addEventListener('click',function(){
                highlightToc(this)
            })
        });
        const observer=new IntersectionObserver((entries)=>{
            entries.forEach(entry=>{
                if(entry.isIntersecting){
                    const id=entry.target.id;
                    document.querySelectorAll('.toc-link').forEach(l=>l.classList.remove('active'));
                    const activeLink=document.querySelector('.toc-link[href="#'+id+'"]');
                    if(activeLink)activeLink.classList.add('active')
                }
            })
        });
        document.querySelectorAll('.api-section').forEach(s=>observer.observe(s));
        document.addEventListener('DOMContentLoaded',function(){
            document.querySelectorAll('pre code').forEach(function(block){hljs.highlightElement(block)});
            const collapsed=localStorage.getItem('sidebarCollapsed')==='true';
            const sidebar=document.querySelector('.sidebar');
            const main=document.querySelector('.main');
            const floatingBtn=document.querySelector('.sidebar-toggle-floating');
            const inlineBtn=document.querySelector('.sidebar-toggle-inline');
            floatingBtn.textContent=collapsed?'→':'←';
            inlineBtn.textContent=collapsed?'→':'←';
            if(collapsed){
                sidebar.classList.add('collapsed');
                main.classList.add('expanded');
                floatingBtn.classList.add('visible');
                inlineBtn.style.display='none'
            }else{
                floatingBtn.classList.remove('visible');
                inlineBtn.style.display='block'
            }
        });
    </script>
</head>
<body>
    <div class="layout">
        <button class="sidebar-toggle-floating" onclick="toggleSidebar()" title="收起/展开菜单">←</button>
        <nav class="sidebar">
            <div class="sidebar-title">
                <span>{{title}}</span>
                <button class="sidebar-toggle-inline" onclick="toggleSidebar()" title="收起">←</button>
            </div>
            <ul class="toc">{{sidebar_content}}</ul>
        </nav>
        <main class="main">{{api_content}}</main>
    </div>
</body>
</html>
